name: Web CI

on:
  push:
    branches: [dev]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
    pull_request: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

jobs:
  lint:
    name: web-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync Sveltekit
        run: bun run prepare

      - name: Lint
        run: bun run lint
